services:
  mysql:
    image: mysql
    environment:
      MYSQL_DATABASE: ragserver
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-rootpass}"
      MYSQL_USER: rag
      MYSQL_PASSWORD: ragpass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis-stack:
    image: redis/redis-stack
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ../backend
    environment:
      SERVER_ADDR: ":8080"
      MYSQL_DSN: "rag:ragpass@tcp(mysql:3306)/ragserver?charset=utf8mb4&parseTime=True&loc=Local"
      REDIS_ADDR: "redis-stack:6379"
      FILE_STORAGE_DIR: "/data/files"
      EMBEDDING_PROVIDER: "${EMBEDDING_PROVIDER:-openai}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ARK_BASE_URL: "${ARK_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}"
      ARK_API_KEY: "${ARK_API_KEY:-}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-text-embedding-3-small}"
      EMBEDDING_DIMENSION: "${EMBEDDING_DIMENSION:-1536}"
      INDEX_TIMEOUT_SECONDS: "${INDEX_TIMEOUT_SECONDS:-300}"
      JWT_SECRET: "${JWT_SECRET:-dev-jwt-secret-change-me}"
      JWT_EXPIRES_HOURS: "${JWT_EXPIRES_HOURS:-24}"
      API_KEY_ENCRYPTION_SECRET: "${API_KEY_ENCRYPTION_SECRET:-change-me-in-production}"
      MCP_UPLOAD_MAX_MB: "20"
      MCP_TMP_DIR: "/data/tmp/mcp"
    ports:
      - "8080:8080"
    volumes:
      - ../storage/files:/data/files
      - ../storage/tmp:/data/tmp
    depends_on:
      mysql:
        condition: service_healthy
      redis-stack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mysql-data:
  redis-data:
